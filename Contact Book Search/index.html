<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Book</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>📞 Contact Book System</h1>

<div class="container">
    <input type="text" id="name" placeholder="Name">
    <input type="text" id="phone" placeholder="Phone Number">
    <input type="email" id="email" placeholder="Email">

    <div class="buttons">
        <button onclick="addContact()">Add</button>
        <button onclick="displayContacts()">Display</button>
        <button onclick="sortContacts()">Sort</button>
        <button onclick="searchContact()">Search</button>
        <button onclick="updateContact()">Update</button>
        <button onclick="deleteContact()">Delete</button>
    </div>
</div>

<h2>Contacts</h2>
<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>Email</th>
        </tr>
    </thead>
    <tbody id="contactTable"></tbody>
</table>

<script src="script.js"></script>
</body>
</html>
